<c-row class="g-4">
  <c-col sm="6" xl="3">
    <c-widget-stat-a
      color="primary"
      [title]="'Motoristas'"
    >
      <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
        {{ totalMotoristas }}
      </ng-template>

      <ng-template cTemplateId="widgetActionTemplate">
        <c-dropdown alignment="end" variant="btn-group">
          <button
            [caret]="false"
            cButton
            cDropdownToggle
            class="p-0 text-white"
            color="transparent"
            aria-label="Open dropdown"
          >
            <svg cIcon name="cilOptions"></svg>
          </button>

          <ul cDropdownMenu>
            <li>
              <a routerLink="/motoristas" cDropdownItem>Ver motoristas</a>
            </li>
          </ul>
        </c-dropdown>
      </ng-template>

      <ng-template cTemplateId="widgetChartTemplate">
        <c-chart
          [data]="data[0]"
          [options]="options[0]"
          class="mt-3 mx-3"
          height="70"
          [type]="'line'"
        />
      </ng-template>
    </c-widget-stat-a>
  </c-col>

  <c-col sm="6" xl="3">
    <c-widget-stat-a
      [title]="'Empresas'"
      color="info"
    >
      <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
        <span>0</span>
      </ng-template>

      <ng-template cTemplateId="widgetChartTemplate">
        <c-chart
          [data]="data[1]"
          [options]="options[1]"
          class="mt-3 mx-3"
          height="70"
          type="line"
        />
      </ng-template>
    </c-widget-stat-a>
  </c-col>

  <c-col sm="6" xl="3">
    <c-widget-stat-a
      [title]="'Entregas'"
      color="warning"
    >
      <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
        <span>0</span>
      </ng-template>

      <ng-template cTemplateId="widgetChartTemplate">
        <c-chart
          [data]="data[2]"
          [options]="options[2]"
          class="mt-3"
          height="70"
          type="line"
        />
      </ng-template>
    </c-widget-stat-a>
  </c-col>

  <c-col sm="6" xl="3">
    <c-widget-stat-a
      [title]="'Pendências'"
      color="danger"
    >
      <ng-template cTemplateId="widgetValueTemplate" ngPreserveWhitespaces>
        <span>0</span>
      </ng-template>

      <ng-template cTemplateId="widgetChartTemplate">
        <c-chart
          [data]="data[3]"
          [options]="options[3]"
          class="mt-3 mx-3"
          height="70"
          type="bar"
        />
      </ng-template>
    </c-widget-stat-a>
  </c-col>
</c-row>
